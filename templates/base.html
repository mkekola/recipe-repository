{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Vault</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="page">
        <header class="site-header">
            <div>
                <h1 class="logo"><a href="{% url 'recipe_list' %}">Recipe Repository</a></h1>
            </div>

            {% if user.is_authenticated %}
                <div class="user-info">
                    <p>Logged in as <strong>{{ user.username }}</strong></p>
                </div>
            {% else %}
                <div class="user-info">
                    <p>Not logged in</p>
                </div>
            {% endif %}

            <nav class="nav">
                {% if user.is_authenticated %}
                    <a href="{% url 'recipe_list' %}">Home</a>
                    <a href="{% url 'my_recipes' %}">My recipes</a>
                    <a href="{% url 'recipe_create' %}">New recipe</a>
                    <a href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'recipe_list' %}">Home</a>
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'register' %}">Register</a>
                {% endif %}
            </nav>
        </header>

        <section class="search-box">
            <form action="{% url 'search' %}" method="get">
                <input type="text" name="q" placeholder="Search recipes...">
                <button type="submit">Search</button>
            </form>
        </section>

        <main class="content-card">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
